# 状态栏背景和前景颜色
set -g status-style "bg={{colors.tertiary.default.hex}},fg={{colors.on_tertiary.default.hex}}"

# 未激活窗口标签颜色
setw -g window-status-style "bg={{colors.tertiary.default.hex}},fg={{colors.on_tertiary.default.hex}}"

# 当前激活窗口标签颜色
setw -g window-status-current-style "bg={{colors.primary.default.hex}},fg={{colors.on_primary.default.hex}}"

# 面板（Pane）边框颜色
set -g pane-border-style "fg={{colors.tertiary.default.hex}}"
set -g pane-active-border-style "fg={{colors.primary.default.hex}}"

# 提示信息和命令模式颜色
set -g message-style "bg={{colors.secondary.default.hex}},fg={{colors.on_secondary.default.hex}}"
